<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
         
    <title>Clhotes</title>
    <!-- css -->
    <link rel="stylesheet" href="./assets/css/config.css">
    <link rel="stylesheet" href="./assets/css/variable.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/menu.css">

    <link rel="stylesheet" href="./assets/css/nav.css">
    <link rel="stylesheet" href="./assets/css/icon.css">
    <link rel="stylesheet" href="./assets/css/sidebar.css">
    <link rel="stylesheet" href="./assets/css/contenu.css">

    <link rel="stylesheet" href="./assets/css/recherche.css">
    <link rel="stylesheet" href="./assets/css/item.css">
    <link rel="stylesheet" href="./assets/css/footer.css">
    <link rel="stylesheet" href="./assets/css/active.css">

    <link rel="stylesheet" href="./assets/css/font.css">
    <link rel="stylesheet" href="./assets/css/animation.css">
    <link rel="stylesheet" href="./assets/css/tenu.css">
    <link rel="stylesheet" href="./assets/css/info_btn_achat/info_achat.css">
    
    <!-- cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container-chlotes" id="container-chlotes">
        <div class="part part-menu">
            <div class="container-base">
                <div class="container-chlotes-menu">
                    <div class="nav-chlotes">
               
                        <div class="icon-right-chlotis-nextgen"  id="leave-chlotes">                               
                            <div class="box-icon">
                                <i class="fa-solid fa-xmark"></i>
                            </div>
                        </div>
                    </div>
                    <div class="center-chlotes" id="side-bar-clhotes">
                        <div class="container-icon-click">

                            <div class="icon-liste-block" id="arms">
                                <img src="./assets/icon/35.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="tshirt">
                                <img src="./assets/icon/32.png" alt="icon-2">
                            </div>

                            <div class="icon-liste-block" id="torso">
                                <img src="./assets/icon/33.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="pants">
                                <img src="./assets/icon/36.png" alt="icon-1">                              
                            </div>

                            <div class="icon-liste-block" id="helmet">
                                <img src="./assets/icon/31.png" alt="icon-3">
                            </div>

                            <div class="icon-liste-block" id="mask">
                                <img src="./assets/icon/38.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="glasses">
                                <img src="./assets/icon/39.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="shoes">
                                <img src="./assets/icon/37.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="bproof">
                                <img src="./assets/icon/34.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="bracelets">
                                <img src="./assets/icon/42.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="watches">
                                <img src="./assets/icon/43.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="bags">
                                <img src="./assets/icon/44.png" alt="icon-1">
                            </div>

        
                            <div class="icon-liste-block" id="ears">
                                <img src="./assets/icon/40.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="decals">
                                <img src="./assets/icon/47.png" alt="icon-1">
                            </div>

                            <div class="icon-liste-block" id="chain">
                                <img src="./assets/icon/41.png" alt="icon-1">
                            </div>
                            
                        

                        </div>
                    </div>
                    <div class="contenu-clhlotes" id="contenu-clhlotes">
                        <div class="recherche-chlotes">
                            
                            <div class="recherche-left">
                                <input id="searchinput" class="input-recherche" type="text" placeholder="Recherche vetement">
                            </div>

                            <div class="recherche-icon-right" id="searh-bar-right-icon">
                                <div class="container-icon-recherhce">
                                    <div class="box-btn-icon">
                                        <i class="fas fa-sort-amount-down icon-recherhce" id="inverse"></i>
                                    </div>

                                    <div class="box-btn-icon">
                                        <i class="fas fa-sort-alpha-down icon-recherhce"></i>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div class="list-item">

                        
                            <div class="container-item" id="ContainerItem"></div>

                        </div>
                    </div>

                    <div class="footer" id="menufooteractive">
                        <button class="btn-page" onClick="action('texture-')">
                            <i class="fa-solid fa-angle-left"></i>
                        </button>
                        
                        <button class="annulle">Annuler</button>
                        
                        <button class="achat" id="Event-open-menu-achat">Acheter</button>

                        <button class="btn-page" onClick="action('texture+')">
                            <i class="fa-solid fa-angle-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="part emplacement-info-achat">
            <div class="container_info_achat" id="affiche-menu-payment" style="display: none;">
                <h3>Liste de vos article :</h3>

                <div class="item_acheter_container" id="item_acheter">
                </div>

                <p style="display: none;" id="message-erreur" class="message-error">Aucun Item dans votre panier !</p>

                <div class="separation"></div>

                <div class="total_price">
                    <p class="style_texte_info_price">Total</p>
                    <p class="price_item_achat" id="affiche-total-price"></p>
                </div>

                <div class="btn_display_price">
                    <button class="btn_payment" id="close-menu">Annuler</button>
                    <button class="btn_payment btn-achat" id="Achat-item-press-btn">Acheter</button>
                </div>

            </div>
        </div>
    </div>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./assets/js/categories.js"></script>
    
    <script defer src="./assets/js/index.js"></script>
    <script defer src="./assets/js/fivem.js"></script>
    <script defer src="./assets/js/select.js"></script>
    <script defer src="./assets/js/greenskin.js"></script>
    <script defer src="./assets/js/menu-tenu.js"></script>
    <script defer src="./assets/js/tenu.js"></script>
    <script src="./assets/js/menu-achat.js"></script>

</html>
